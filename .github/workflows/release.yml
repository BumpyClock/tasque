name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --all-targets --all-features

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build bundled OpenTUI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname | tr '[:upper:]' '[:lower:]')-$(uname -m)" in
            linux-x86_64) BUN_TARGET="bun-linux-x64-baseline" ;;
            linux-aarch64|linux-arm64) BUN_TARGET="bun-linux-arm64" ;;
            darwin-x86_64) BUN_TARGET="bun-darwin-x64" ;;
            darwin-arm64) BUN_TARGET="bun-darwin-arm64" ;;
            *) echo "Unsupported OpenTUI build host: $(uname)-$(uname -m)" >&2; exit 1 ;;
          esac
          case "$(uname | tr '[:upper:]' '[:lower:]')" in
            linux) BUN_OS="linux" ;;
            darwin) BUN_OS="darwin" ;;
          esac
          case "$(uname -m)" in
            x86_64) BUN_CPU="x64" ;;
            aarch64|arm64) BUN_CPU="arm64" ;;
          esac
          mkdir -p dist/tui
          cd tui-opentui
          bun install --frozen-lockfile --os "${BUN_OS}" --cpu "${BUN_CPU}"
          bun build --compile --target="${BUN_TARGET}" src/index.tsx --outfile ../dist/tui/tsq-tui
          chmod +x ../dist/tui/tsq-tui

      - name: Build bundled OpenTUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bunTarget = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'bun-windows-arm64' } else { 'bun-windows-x64' }
          $bunCpu = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
          New-Item -ItemType Directory -Force dist/tui | Out-Null
          Push-Location tui-opentui
          bun install --frozen-lockfile --os win32 --cpu $bunCpu
          bun build --compile "--target=$bunTarget" src/index.tsx --outfile ../dist/tui/tsq-tui.exe
          Pop-Location

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          OS="$(uname | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          mkdir -p dist/releases
          BIN="target/release/tsq"
          BUNDLE_DIR="dist/releases/tsq-v${VERSION}-${OS}-${ARCH}"
          rm -rf "${BUNDLE_DIR}"
          mkdir -p "${BUNDLE_DIR}"
          cp "${BIN}" "${BUNDLE_DIR}/tsq"
          cp "dist/tui/tsq-tui" "${BUNDLE_DIR}/tsq-tui"
          chmod +x "${BUNDLE_DIR}/tsq"
          chmod +x "${BUNDLE_DIR}/tsq-tui"
          if [[ -d "SKILLS" ]]; then
            cp -R "SKILLS" "${BUNDLE_DIR}/SKILLS"
          else
            echo "Error: SKILLS directory missing from repo root" >&2
            exit 1
          fi
          if [[ ! -f "${BUNDLE_DIR}/SKILLS/tasque/SKILL.md" ]]; then
            echo "Error: SKILLS bundle missing SKILLS/tasque/SKILL.md" >&2
            exit 1
          fi
          TARBALL="${BUNDLE_DIR}.tar.gz"
          tar -czf "${TARBALL}" -C dist/releases "tsq-v${VERSION}-${OS}-${ARCH}"
          rm -rf "${BUNDLE_DIR}"
          shasum -a 256 "${TARBALL}" > dist/releases/SHA256SUMS.txt

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $versionLine = Get-Content Cargo.toml | Where-Object { $_ -match '^version = ' } | Select-Object -First 1
          $version = $versionLine -replace '^version = \"([^\"]+)\"$', '$1'
          $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          New-Item -ItemType Directory -Force dist/releases | Out-Null
          $bin = 'target/release/tsq.exe'
          $bundle = "dist/releases/tsq-v$version-windows-$arch"
          if (Test-Path $bundle) { Remove-Item $bundle -Recurse -Force }
          New-Item -ItemType Directory -Force $bundle | Out-Null
          Copy-Item $bin (Join-Path $bundle 'tsq.exe') -Force
          Copy-Item 'dist/tui/tsq-tui.exe' (Join-Path $bundle 'tsq-tui.exe') -Force
          if (Test-Path 'SKILLS') { Copy-Item 'SKILLS' (Join-Path $bundle 'SKILLS') -Recurse -Force } else { Write-Error 'SKILLS directory missing from repo root'; exit 1 }
          if (-not (Test-Path (Join-Path $bundle 'SKILLS/tasque/SKILL.md'))) { Write-Error 'SKILLS bundle missing SKILLS/tasque/SKILL.md'; exit 1 }
          $zip = "$bundle.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path $bundle -DestinationPath $zip -Force
          Remove-Item $bundle -Recurse -Force
          $hash = Get-FileHash $zip -Algorithm SHA256
          "{0}  {1}" -f $hash.Hash.ToLower(), (Split-Path $zip -Leaf) | Set-Content dist/releases/SHA256SUMS.txt

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.event.release.tag_name }}
          files: dist/releases/*
