name: npm-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
            bun_os: darwin
            bun_cpu: arm64
            tui_bin: tsq-tui
            runner: macos-14
            method: native
          - platform: darwin-x64
            target: x86_64-apple-darwin
            bun_target: bun-darwin-x64
            bun_os: darwin
            bun_cpu: x64
            tui_bin: tsq-tui
            runner: macos-14
            method: cross
          - platform: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64-baseline
            bun_os: linux
            bun_cpu: x64
            tui_bin: tsq-tui
            runner: ubuntu-latest
            method: native
          - platform: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            bun_target: bun-linux-arm64
            bun_os: linux
            bun_cpu: arm64
            tui_bin: tsq-tui
            runner: ubuntu-latest
            method: zigbuild
          - platform: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
            bun_os: win32
            bun_cpu: x64
            tui_bin: tsq-tui.exe
            runner: windows-latest
            method: native
          - platform: win32-arm64-msvc
            target: aarch64-pc-windows-msvc
            bun_target: bun-windows-arm64
            bun_os: win32
            bun_cpu: arm64
            tui_bin: tsq-tui.exe
            runner: windows-latest
            method: cross

    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2

      - name: Install zigbuild (Linux ARM64)
        if: matrix.method == 'zigbuild'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build (native)
        if: matrix.method == 'native'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.method == 'zigbuild'
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}.2.17

      - name: Build (cross-compile)
        if: matrix.method == 'cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Install OpenTUI dependencies
        working-directory: tui-opentui
        run: bun install --frozen-lockfile --os ${{ matrix.bun_os }} --cpu ${{ matrix.bun_cpu }}

      - name: Build bundled OpenTUI
        working-directory: tui-opentui
        run: bun build --compile --target=${{ matrix.bun_target }} src/index.tsx --outfile ../target/${{ matrix.target }}/release/${{ matrix.tui_bin }}

      - name: Upload binary (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/tsq
            target/${{ matrix.target }}/release/tsq-tui

      - name: Upload binary (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/tsq.exe
            target/${{ matrix.target }}/release/tsq-tui.exe

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-artifacts

      - name: Reorganize artifacts
        run: |
          mkdir -p artifacts
          for dir in raw-artifacts/binary-*/; do
            platform=$(basename "$dir" | sed 's/^binary-//')
            case "$platform" in
              darwin-arm64) target="aarch64-apple-darwin" ;;
              darwin-x64) target="x86_64-apple-darwin" ;;
              linux-x64-gnu) target="x86_64-unknown-linux-gnu" ;;
              linux-arm64-gnu) target="aarch64-unknown-linux-gnu" ;;
              win32-x64-msvc) target="x86_64-pc-windows-msvc" ;;
              win32-arm64-msvc) target="aarch64-pc-windows-msvc" ;;
            esac
            mkdir -p "artifacts/$target"
            cp "$dir"* "artifacts/$target/"
          done

      - name: Build npm packages
        run: bash scripts/build-npm.sh

      - name: Validate platform package binaries
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail

          declare -A EXPECTED_TSQ=(
            ["darwin-arm64"]="tsq"
            ["darwin-x64"]="tsq"
            ["linux-x64-gnu"]="tsq"
            ["linux-arm64-gnu"]="tsq"
            ["win32-x64-msvc"]="tsq.exe"
            ["win32-arm64-msvc"]="tsq.exe"
          )
          declare -A EXPECTED_TUI=(
            ["darwin-arm64"]="tsq-tui"
            ["darwin-x64"]="tsq-tui"
            ["linux-x64-gnu"]="tsq-tui"
            ["linux-arm64-gnu"]="tsq-tui"
            ["win32-x64-msvc"]="tsq-tui.exe"
            ["win32-arm64-msvc"]="tsq-tui.exe"
          )

          missing=0
          for platform in "${!EXPECTED_TSQ[@]}"; do
            dir="npm/platforms/$platform"
            bin="$dir/${EXPECTED_TSQ[$platform]}"
            if [[ ! -s "$bin" ]]; then
              echo "::error::Missing expected binary for $platform: $bin"
              ls -la "$dir" || true
              missing=1
            fi
            tui="$dir/${EXPECTED_TUI[$platform]}"
            if [[ ! -s "$tui" ]]; then
              echo "::error::Missing expected OpenTUI binary for $platform: $tui"
              ls -la "$dir" || true
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Pre-publish validation failed."
            exit 1
          fi

          echo "Pre-publish validation passed."

      - name: Publish platform packages
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./npm/package.json').version)")
          for dir in npm/platforms/*/; do
            PKG_NAME=$(node -e "console.log(require('./${dir}package.json').name)")
            EXISTING=$(npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null || echo "")
            if [ -n "$EXISTING" ]; then
              echo "Skipping $PKG_NAME@$VERSION (already published)"
            else
              echo "Publishing $PKG_NAME@$VERSION"
              npm publish "$dir" --provenance --access public
            fi
          done

      - name: Publish root package
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./npm/package.json').version)")
          PKG_NAME="@bumpyclock/tasque"
          EXISTING=$(npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Skipping $PKG_NAME@$VERSION (already published)"
          else
            echo "Publishing $PKG_NAME@$VERSION"
            npm publish npm/ --provenance --access public
          fi

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== Dry Run ==="
          echo "Would publish the following packages:"
          for dir in npm/platforms/*/; do
            PKG=$(node -e "const p=require('./${dir}package.json'); console.log(p.name + '@' + p.version)")
            echo "  $PKG"
            ls -la "$dir"
          done
          ROOT=$(node -e "const p=require('./npm/package.json'); console.log(p.name + '@' + p.version)")
          echo "  $ROOT"
